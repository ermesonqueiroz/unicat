<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gatos da UNIFOR — Busca</title>
  <style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
  body { width:390px; min-height:844px; background:#F5F7FA; overflow:hidden; position:relative; }
  .header { background:#1A56A0; color:#fff; padding:14px 18px; display:flex; align-items:center; gap:10px; min-height:56px; }
  .header h1 { font-size:17px; font-weight:600; }
  .header .back { font-size:20px; cursor:pointer; color:#fff; text-decoration:none; }
  .nav { position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; display:flex; height:62px; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10px; color:#6B7280; cursor:pointer; }
  .nav-item.active { color:#1A56A0; }
  .nav-icon { font-size:22px; }
  .content { overflow-y:auto; padding:14px; }
  .card { background:#fff; border-radius:12px; border:1px solid #E5E7EB; padding:14px; margin-bottom:12px; }
  .btn-primary { background:#1A56A0; color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .btn-secondary { background:#fff; color:#1A56A0; border:2px solid #1A56A0; border-radius:10px; padding:12px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .input-group { margin-bottom:14px; }
  .input-group label { font-size:13px; color:#6B7280; margin-bottom:5px; display:block; font-weight:500; }
  .input-group input { width:100%; border:1px solid #E5E7EB; border-radius:8px; padding:11px 13px; font-size:15px; color:#1A1A2E; background:#fff; outline:none; }
  .input-group input:focus { border-color:#1A56A0; }
  .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .tag { background:#E8F0FB; color:#1A56A0; font-size:11px; padding:3px 8px; border-radius:20px; font-weight:500; }
</style>
</head>
<body>

  <style>
    .content { padding:14px; height:726px; overflow-y:auto; }
    .search-bar { display:flex; align-items:center; background:#fff; border:2px solid #1A56A0; border-radius:10px; padding:9px 13px; margin-bottom:14px; gap:8px; }
    .search-bar input { border:none; outline:none; font-size:15px; flex:1; color:#1A1A2E; }
    .filter-tabs { display:flex; gap:8px; margin-bottom:16px; }
    .filter-chip { padding:6px 15px; border-radius:20px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid #E5E7EB; background:#fff; color:#6B7280; }
    .filter-chip.active { background:#1A56A0; color:#fff; border-color:#1A56A0; }
    .group-label { font-size:11px; font-weight:700; color:#6B7280; margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px; }
    .result-item { display:flex; align-items:center; gap:12px; background:#fff; border-radius:12px; border:1px solid #E5E7EB; padding:11px 13px; margin-bottom:9px; cursor:pointer; }
    .result-avatar { width:46px; height:46px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .result-info h4 { font-size:15px; font-weight:600; color:#1A1A2E; }
    .result-info p { font-size:12px; color:#6B7280; margin-top:2px; }
    .result-arrow { margin-left:auto; color:#6B7280; font-size:20px; }
  </style>
  <div class="header"><h1>Buscar</h1></div>
  <div class="content">
    <div class="search-bar"><span>🔍</span><input placeholder="Buscar gatos ou usuários..." value="Ming"></div>
    <div class="filter-tabs">
      <div class="filter-chip active">Todos</div>
      <div class="filter-chip">Gatos</div>
      <div class="filter-chip">Usuários</div>
    </div>
    <div class="group-label">Gatos</div>
    <div class="result-item"><div class="result-avatar" style="background:#E8F0FB">🐱</div><div class="result-info"><h4>Mingau</h4><p>📍 Bloco C · 7 padrinhos</p></div><div class="result-arrow">›</div></div>
    <div class="group-label" style="margin-top:8px">Usuários</div>
    <div class="result-item"><div class="result-avatar" style="background:#fce7f3;border-radius:50%">👩</div><div class="result-info"><h4>Ana Mingote</h4><p>2 afilhados</p></div><div class="result-arrow">›</div></div>
    <div class="result-item"><div class="result-avatar" style="background:#ecfdf5;border-radius:50%">👨</div><div class="result-info"><h4>Minguel Ferreira</h4><p>1 afilhado</p></div><div class="result-arrow">›</div></div>
  </div>
  <div class="nav">
    <div class="nav-item"><div class="nav-icon">🗺️</div><span>Mapa</span></div>
    <div class="nav-item"><div class="nav-icon">🐱</div><span>Gatos</span></div>
    <div class="nav-item active"><div class="nav-icon">📰</div><span>Feed</span></div>
    <div class="nav-item"><div class="nav-icon">👤</div><span>Perfil</span></div>
  </div>

</body>
</html>
