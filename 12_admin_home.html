<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gatos da UNIFOR — Admin — Dashboard</title>
  <style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
  body { width:390px; min-height:844px; background:#F5F7FA; overflow:hidden; position:relative; }
  .header { background:#1A56A0; color:#fff; padding:14px 18px; display:flex; align-items:center; gap:10px; min-height:56px; }
  .header h1 { font-size:17px; font-weight:600; }
  .header .back { font-size:20px; cursor:pointer; color:#fff; text-decoration:none; }
  .nav { position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; display:flex; height:62px; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10px; color:#6B7280; cursor:pointer; }
  .nav-item.active { color:#1A56A0; }
  .nav-icon { font-size:22px; }
  .content { overflow-y:auto; padding:14px; }
  .card { background:#fff; border-radius:12px; border:1px solid #E5E7EB; padding:14px; margin-bottom:12px; }
  .btn-primary { background:#1A56A0; color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .btn-secondary { background:#fff; color:#1A56A0; border:2px solid #1A56A0; border-radius:10px; padding:12px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .input-group { margin-bottom:14px; }
  .input-group label { font-size:13px; color:#6B7280; margin-bottom:5px; display:block; font-weight:500; }
  .input-group input { width:100%; border:1px solid #E5E7EB; border-radius:8px; padding:11px 13px; font-size:15px; color:#1A1A2E; background:#fff; outline:none; }
  .input-group input:focus { border-color:#1A56A0; }
  .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .tag { background:#E8F0FB; color:#1A56A0; font-size:11px; padding:3px 8px; border-radius:20px; font-weight:500; }
</style>
</head>
<body>

  <style>
    .admin-header { background:#0D3D7A; padding:16px 16px 14px; }
    .admin-header .greeting { color:rgba(255,255,255,0.7); font-size:13px; }
    .admin-header h1 { color:#fff; font-size:19px; font-weight:700; margin-top:3px; }
    .content { padding:14px; height:708px; overflow-y:auto; }
    .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
    .stat-card { background:#fff; border:1px solid #E5E7EB; border-radius:12px; padding:14px; }
    .stat-icon { font-size:22px; margin-bottom:6px; }
    .stat-label { font-size:11px; color:#6B7280; font-weight:500; }
    .stat-value { font-size:22px; font-weight:700; color:#1A1A2E; margin-top:2px; }
    .stat-delta { font-size:11px; color:#16A34A; margin-top:2px; font-weight:500; }
    .section-title { font-size:15px; font-weight:700; color:#1A1A2E; margin-bottom:10px; }
    .alert-card { background:#FEF3C7; border:1px solid #FCD34D; border-radius:10px; padding:12px 14px; display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .alert-card p { font-size:13px; color:#92400E; font-weight:500; }
    .quick-action { display:flex; gap:8px; margin-bottom:10px; }
    .qa-btn { background:#E8F0FB; color:#1A56A0; border:none; border-radius:10px; padding:11px 14px; font-size:13px; font-weight:600; cursor:pointer; flex:1; text-align:center; }
    .admin-nav { position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; display:flex; height:62px; }
  </style>
  <div class="admin-header">
    <div class="greeting">Bem-vindo de volta,</div>
    <h1>Admin Carlos 👋</h1>
  </div>
  <div class="content">
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-icon">🐱</div><div class="stat-label">Gatos cadastrados</div><div class="stat-value">12</div><div class="stat-delta">+2 este mês</div></div>
      <div class="stat-card"><div class="stat-icon">🤝</div><div class="stat-label">Padrinhos ativos</div><div class="stat-value">47</div><div class="stat-delta">+8 este mês</div></div>
      <div class="stat-card"><div class="stat-icon">👥</div><div class="stat-label">Usuários</div><div class="stat-value">183</div><div class="stat-delta">+15 este mês</div></div>
      <div class="stat-card"><div class="stat-icon">📰</div><div class="stat-label">Posts no feed</div><div class="stat-value">94</div><div class="stat-delta">+22 este mês</div></div>
    </div>
    <div class="alert-card"><span style="font-size:20px">⚠️</span><p>Mingau sem localização atualizada há 3 dias</p></div>
    <div class="section-title">Ações rápidas</div>
    <div class="quick-action">
      <button class="qa-btn">+ Cadastrar gato</button>
      <button class="qa-btn">👥 Ver usuários</button>
    </div>
    <div class="quick-action">
      <button class="qa-btn">📰 Moderar feed</button>
      <button class="qa-btn">🗺️ Atualizar mapa</button>
    </div>
  </div>
  <div class="admin-nav">
    <div class="nav-item active"><div class="nav-icon">🏠</div><span>Home</span></div>
    <div class="nav-item"><div class="nav-icon">🐱</div><span>Gatos</span></div>
    <div class="nav-item"><div class="nav-icon">👥</div><span>Usuários</span></div>
    <div class="nav-item"><div class="nav-icon">📰</div><span>Feed</span></div>
    <div class="nav-item"><div class="nav-icon">🗺️</div><span>Mapa</span></div>
  </div>

</body>
</html>
