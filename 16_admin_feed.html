<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gatos da UNIFOR — Admin — Moderação do Feed</title>
  <style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
  body { width:390px; min-height:844px; background:#F5F7FA; overflow:hidden; position:relative; }
  .header { background:#1A56A0; color:#fff; padding:14px 18px; display:flex; align-items:center; gap:10px; min-height:56px; }
  .header h1 { font-size:17px; font-weight:600; }
  .header .back { font-size:20px; cursor:pointer; color:#fff; text-decoration:none; }
  .nav { position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #E5E7EB; display:flex; height:62px; }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; font-size:10px; color:#6B7280; cursor:pointer; }
  .nav-item.active { color:#1A56A0; }
  .nav-icon { font-size:22px; }
  .content { overflow-y:auto; padding:14px; }
  .card { background:#fff; border-radius:12px; border:1px solid #E5E7EB; padding:14px; margin-bottom:12px; }
  .btn-primary { background:#1A56A0; color:#fff; border:none; border-radius:10px; padding:13px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .btn-secondary { background:#fff; color:#1A56A0; border:2px solid #1A56A0; border-radius:10px; padding:12px; font-size:15px; font-weight:600; width:100%; cursor:pointer; }
  .input-group { margin-bottom:14px; }
  .input-group label { font-size:13px; color:#6B7280; margin-bottom:5px; display:block; font-weight:500; }
  .input-group input { width:100%; border:1px solid #E5E7EB; border-radius:8px; padding:11px 13px; font-size:15px; color:#1A1A2E; background:#fff; outline:none; }
  .input-group input:focus { border-color:#1A56A0; }
  .badge { display:inline-block; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:600; }
  .tag { background:#E8F0FB; color:#1A56A0; font-size:11px; padding:3px 8px; border-radius:20px; font-weight:500; }
</style>
</head>
<body>

  <style>
    .content { padding:14px; height:726px; overflow-y:auto; }
    .mod-post { background:#fff; border:1px solid #E5E7EB; border-radius:12px; margin-bottom:12px; overflow:hidden; }
    .mod-post-header { display:flex; align-items:center; gap:10px; padding:10px 12px; }
    .mod-avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
    .mod-user { font-weight:600; font-size:14px; color:#1A1A2E; }
    .mod-caption { font-size:12px; color:#6B7280; margin-top:1px; }
    .mod-img { width:100%; height:138px; display:flex; align-items:center; justify-content:center; font-size:58px; }
    .mod-actions { display:flex; padding:10px 12px; gap:8px; border-top:1px solid #E5E7EB; }
    .mod-btn { flex:1; border:none; border-radius:8px; padding:9px; font-size:13px; font-weight:700; cursor:pointer; }
    .mod-keep { background:#DCFCE7; color:#15803D; }
    .mod-delete { background:#FEE2E2; color:#DC2626; }
    .badge-ok { background:#DCFCE7; color:#15803D; font-size:11px; padding:2px 8px; border-radius:6px; font-weight:700; margin-left:auto; }
    .badge-flag { background:#FEE2E2; color:#DC2626; font-size:11px; padding:2px 8px; border-radius:6px; font-weight:700; margin-left:auto; }
  </style>
  <div class="header"><h1>Moderação do Feed</h1></div>
  <div class="content">
    <div class="mod-post">
      <div class="mod-post-header"><div class="mod-avatar" style="background:#E8F0FB">👩</div><div style="flex:1"><div class="mod-user">Ana Souza</div><div class="mod-caption">Mingau tá todo fofo hoje!</div></div><span class="badge-ok">✓ OK</span></div>
      <div class="mod-img" style="background:#E8F0FB">🐱</div>
      <div class="mod-actions"><button class="mod-btn mod-keep">Manter</button><button class="mod-btn mod-delete">Excluir</button></div>
    </div>
    <div class="mod-post">
      <div class="mod-post-header"><div class="mod-avatar" style="background:#FEE2E2">⚠️</div><div style="flex:1"><div class="mod-user">Usuário desconhecido</div><div class="mod-caption">Conteúdo reportado por usuários</div></div><span class="badge-flag">⚠️ Denúncia</span></div>
      <div class="mod-img" style="background:#FEF2F2">🚫</div>
      <div class="mod-actions"><button class="mod-btn mod-keep">Manter</button><button class="mod-btn mod-delete">Excluir</button></div>
    </div>
  </div>
  <div class="nav">
    <div class="nav-item"><div class="nav-icon">🏠</div><span>Home</span></div>
    <div class="nav-item"><div class="nav-icon">🐱</div><span>Gatos</span></div>
    <div class="nav-item"><div class="nav-icon">👥</div><span>Usuários</span></div>
    <div class="nav-item active"><div class="nav-icon">📰</div><span>Feed</span></div>
    <div class="nav-item"><div class="nav-icon">🗺️</div><span>Mapa</span></div>
  </div>

</body>
</html>
